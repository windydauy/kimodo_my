model:
  num_base_steps: 1000

  teacher_denoiser:
    _target_: kimodo.model.twostage_denoiser.TwostageDenoiser
    motion_mask_mode: concat
    ckpt_path: ./huggingface/hub/models--nvidia--Kimodo-G1-RP-v1/snapshots/3020ad8c419c244e0429d360163730c63c4ed011/model.safetensors
    motion_rep:
      _target_: kimodo.motion_rep.KimodoMotionRep
      fps: 30
      stats_path: ./huggingface/hub/models--nvidia--Kimodo-G1-RP-v1/snapshots/3020ad8c419c244e0429d360163730c63c4ed011/stats/motion
      skeleton:
        _target_: kimodo.skeleton.G1Skeleton34
    llm_shape: [1, 4096]
    use_text_mask: false
    latent_dim: 1024
    ff_size: 2048
    num_layers: 16
    num_heads: 8
    activation: gelu
    dropout: 0.0
    pe_dropout: 0.0
    norm_first: false
    num_text_tokens_override: 50
    input_first_heading_angle: true

  student_denoiser:
    _target_: kimodo.model.twostage_denoiser.TwostageDenoiser
    motion_mask_mode: concat
    ckpt_path: null
    motion_rep:
      _target_: kimodo.motion_rep.KimodoMotionRep
      fps: 30
      stats_path: ./huggingface/hub/models--nvidia--Kimodo-G1-RP-v1/snapshots/3020ad8c419c244e0429d360163730c63c4ed011/stats/motion
      skeleton:
        _target_: kimodo.skeleton.G1Skeleton34
    llm_shape: [1, 4096]
    use_text_mask: false
    latent_dim: 1024
    ff_size: 2048
    num_layers: 8
    num_heads: 8
    activation: gelu
    dropout: 0.0
    pe_dropout: 0.0
    norm_first: false
    num_text_tokens_override: 50
    input_first_heading_angle: true

text_encoder:
  _target_: kimodo.model.LLM2VecEncoder
  base_model_name_or_path: McGill-NLP/LLM2Vec-Meta-Llama-3-8B-Instruct-mntp
  peft_model_name_or_path: McGill-NLP/LLM2Vec-Meta-Llama-3-8B-Instruct-mntp-supervised
  dtype: bfloat16
  llm_dim: 4096

data:
  num_workers: 0
  pin_memory: true
  dataset:
    _target_: kimodo.training.dataset.G1CSVTextDataset
    csv_root: ./dataset/g1/csv
    timelines_path: ./dataset/timelines.jsonl
    max_frames: 300
    to_normalize: true
    random_crop: true
    rotate_to_zero_prob: 0.0
    randomize_first_heading_prob: 1.0
    translate_to_zero_prob: 1.0
    text_mode: overview
    source_coord_system: mujoco
    root_euler_order: xyz
    root_angle_unit: degrees
    joint_angle_unit: degrees
    root_position_unit: centimeters
    root_position_scale: 1.0
    input_fps: 120
    skip_bad_samples: true
    max_bad_sample_retries: 16
    phase2_enabled: true
    phase2_num_keyframes: 1
    phase2_constraint_mode: mixed
    phase2_constraint_policy: paper
    phase2_fullbody_prob: 0.5
    phase2_include_first: true
    phase2_include_last: true
    phase2_condition_normalized: true
    phase2_return_constraints: false
    phase2_no_constraint_prob: 0.1
    phase2_mix_two_patterns_prob: 0.25
    phase2_bias_towards_fewer_keyframes: true
    phase2_dense_path_stride: 1
    phase2_end_effector_joint_pool: [LeftHand, RightHand, LeftFoot, RightFoot]
    phase2_pattern_weights:
      fullbody_sparse: 1.0
      endeffector_sparse: 1.0
      root2d_sparse: 1.0
      root2d_dense: 1.0
      foot_contacts_sparse: 1.0

loss:
  teacher_weight: 0.8
  gt_weight: 0.2
  weight_schedule:
    enabled: false
    type: linear
    start_step: 0
    end_step: 10000
    teacher_start: 0.8
    teacher_end: 0.8
    gt_start: 0.2
    gt_end: 0.2
  teacher_gammas: [10.0, 2.0, 10.0, 3.0, 10.0, 4.0, 5.0]
  gt_gammas: [10.0, 2.0, 10.0, 3.0, 10.0, 4.0, 5.0]

distillation:
  teacher_steps: 100
  student_steps: 20
  student_init_from_teacher: true
  student_init_mode: matching_params
  teacher_layer_indices_for_student: null

phase2:
  enabled: true
  start_step: 0
  end_step: 1000
  start_keyframes: 1
  end_keyframes: 20

training:
  seed: 42
  deterministic: false
  output_dir: ./outputs/g1_distill_16to8_100to20

  resume: null
  total_steps: 10000
  batch_size: 64
  optimizer: adam_atan2
  betas: [0.9, 0.999]
  lr: 2.0e-5
  weight_decay: 0.0
  mixed_precision: fp16
  gradient_clip: 1.0
  ema_decay: 0.995
  ema_every: 10
  cfg_dropout_text_prob: 0.1
  cfg_dropout_motion_prob: 0.0
  log_every: 10
  save_every: 1000
  skip_text_encode_errors: true
  max_text_encode_retries: 16
  max_checkpoints_to_keep: 5

wandb:
  enabled: true
  project: kimodo-g1-distill
  entity: null
  name: g1_distill_16to8_100to20-2GPU
  group: null
  job_type: train
  tags: [g1, distill, 16to8, 100to20]
  mode: online
  resume: allow
  id: null
