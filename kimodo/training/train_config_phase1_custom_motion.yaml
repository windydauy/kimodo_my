model:
  num_base_steps: 1000
  denoiser:
    _target_: kimodo.model.twostage_denoiser.TwostageDenoiser
    motion_mask_mode: concat
    ckpt_path: ./huggingface/hub/models--nvidia--Kimodo-G1-RP-v1/snapshots/3020ad8c419c244e0429d360163730c63c4ed011/model.safetensors
    motion_rep:
      _target_: kimodo.motion_rep.KimodoMotionRep
      fps: 30
      stats_path: ./huggingface/hub/models--nvidia--Kimodo-G1-RP-v1/snapshots/3020ad8c419c244e0429d360163730c63c4ed011/stats/motion
      skeleton:
        _target_: kimodo.skeleton.G1Skeleton34
    llm_shape: [1, 4096]
    use_text_mask: false
    latent_dim: 1024
    ff_size: 2048
    num_layers: 16
    num_heads: 8
    activation: gelu
    dropout: 0.0
    pe_dropout: 0.0
    norm_first: false
    num_text_tokens_override: 50
    input_first_heading_angle: true

text_encoder:
  _target_: kimodo.model.LLM2VecEncoder
  base_model_name_or_path: McGill-NLP/LLM2Vec-Meta-Llama-3-8B-Instruct-mntp
  peft_model_name_or_path: McGill-NLP/LLM2Vec-Meta-Llama-3-8B-Instruct-mntp-supervised
  dtype: bfloat16
  llm_dim: 4096

data:
  num_workers: 0
  pin_memory: true
  dataset:
    _target_: kimodo.training.custom_motion_npz.G1NPZTextDataset
    npz_root: ./custom_motion/robot-object
    timelines_path: ./custom_motion/timeline_sub10.jsonl
    annotated_only: true
    max_frames: 300
    to_normalize: true
    random_crop: true
    rotate_to_zero_prob: 0.0
    randomize_first_heading_prob: 1.0
    translate_to_zero_prob: 1.0
    text_mode: mixed
    input_fps: 50
    phase2_enabled: false

loss:
  gammas: [10.0, 2.0, 10.0, 3.0, 10.0, 4.0, 5.0]

training:
  seed: 42
  deterministic: false
  output_dir: ./outputs/g1_finetune-custom_motion-phase1-1k

  resume: null
  total_steps: 1000
  batch_size: 64
  optimizer: adam_atan2
  betas: [0.9, 0.999]
  lr: 2.0e-5
  weight_decay: 0.0
  mixed_precision: fp16
  gradient_clip: 1.0
  ema_decay: 0.995
  ema_every: 10
  cfg_dropout_text_prob: 0.1
  cfg_dropout_motion_prob: 0.0
  log_every: 10
  save_every: 1000
  max_checkpoints_to_keep: 5

phase2:
  enabled: false
  start_step: 500000
  end_step: 1000000
  start_keyframes: 1
  end_keyframes: 12

wandb:
  enabled: false
  project: kimodo-g1-finetune
  entity: null
  name: g1_finetune-custom_motion-phase1-1k
  group: null
  job_type: train
  tags: [g1, finetune, custom-motion]
  mode: online
  resume: allow
  id: null
